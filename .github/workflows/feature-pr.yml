name: Feature PR

on:
  push:
    branches:
      - 'frontend/**'
      - 'backend/**'
      - 'feature/**'
      - 'fix/**'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate-and-open:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:activity
      - run: npm run build -- --publish never
        env:
          NIGHTWATCH_ENABLE_LOCAL_FILES: ${{ vars.NIGHTWATCH_ENABLE_LOCAL_FILES }}
          NIGHTWATCH_ENABLE_DRIVE: ${{ vars.NIGHTWATCH_ENABLE_DRIVE }}
          NIGHTWATCH_ENABLE_LIBRARY: ${{ vars.NIGHTWATCH_ENABLE_LIBRARY }}
          NIGHTWATCH_ENABLE_YOUTUBE_ACCOUNT: ${{ vars.NIGHTWATCH_ENABLE_YOUTUBE_ACCOUNT }}
          NIGHTWATCH_GOOGLE_CLIENT_ID: ${{ vars.NIGHTWATCH_GOOGLE_CLIENT_ID }}
          NIGHTWATCH_GOOGLE_PICKER_API_KEY: ${{ vars.NIGHTWATCH_GOOGLE_PICKER_API_KEY }}
          NIGHTWATCH_GOOGLE_APP_ID: ${{ vars.NIGHTWATCH_GOOGLE_APP_ID }}
      - name: Create or update pull request
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace('refs/heads/', '');
            const commitMessage = context.payload.head_commit?.message ?? '';
            const reviewedAutomerge = /^Automerge:\s*reviewed\s*$/mi.test(commitMessage);
            const existing = await github.rest.pulls.list({ owner, repo, head: `${owner}:${head}`, base: 'main', state: 'open' });
            let pull;
            if (existing.data.length === 0) {
              const title = context.payload.head_commit?.message?.split('\n')[0] ?? `Merge ${head}`;
              try {
                const created = await github.rest.pulls.create({
                  owner, repo, head, base: 'main', title,
                  body: `Automated PR for \`${head}\`.\n\nValidation passed: install, tests, typecheck, Activity build, and Electron package.\n\nMerge requires either owner action or an explicit reviewed automerge trailer.`,
                });
                pull = created.data;
                core.summary.addLink(`Pull request #${created.data.number}`, created.data.html_url).write();
              } catch (error) {
                const message = String(error?.message ?? error);
                if (error?.status === 422 && /No commits between/i.test(message)) {
                  core.notice(`${head} is already merged into main; no pull request is needed.`);
                  core.summary.addHeading('No pull request needed').addRaw(`\`${head}\` is already contained in \`main\`.`).write();
                } else if (error?.status === 403) {
                  core.setFailed('GitHub Actions cannot create pull requests. Enable Settings → Actions → General → Workflow permissions → Allow GitHub Actions to create and approve pull requests.');
                } else {
                  throw error;
                }
              }
            } else {
              pull = existing.data[0];
              core.summary.addLink(`Updated pull request #${pull.number}`, pull.html_url).write();
            }

            // A reviewed trailer is the auditable opt-in. Ordinary Claude,
            // Codex, or user pushes remain unlabeled and therefore never
            // auto-merge merely because their build is green.
            if (pull !== undefined && reviewedAutomerge) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: 'automerge' });
              } catch (error) {
                if (error?.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner, repo, name: 'automerge', color: '1f883d',
                  description: 'Reviewed branch may merge after all validation passes',
                });
              }
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pull.number, labels: ['automerge'],
              });
              core.notice(`PR #${pull.number} opted into reviewed automerge.`);
            }
