name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to publish from current main
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:activity
      - name: Create version commit and tag
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ inputs.bump }}"
          git push origin HEAD:main --follow-tags
      - name: Build and publish
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_DISCORD_CLIENT_ID: ${{ vars.VITE_DISCORD_CLIENT_ID }}
          NIGHTWATCH_ENABLE_LOCAL_FILES: ${{ vars.NIGHTWATCH_ENABLE_LOCAL_FILES }}
          NIGHTWATCH_ENABLE_DRIVE: ${{ vars.NIGHTWATCH_ENABLE_DRIVE }}
          NIGHTWATCH_ENABLE_LIBRARY: ${{ vars.NIGHTWATCH_ENABLE_LIBRARY }}
          NIGHTWATCH_ENABLE_YOUTUBE_ACCOUNT: ${{ vars.NIGHTWATCH_ENABLE_YOUTUBE_ACCOUNT }}
          NIGHTWATCH_GOOGLE_CLIENT_ID: ${{ vars.NIGHTWATCH_GOOGLE_CLIENT_ID }}
          NIGHTWATCH_GOOGLE_PICKER_API_KEY: ${{ vars.NIGHTWATCH_GOOGLE_PICKER_API_KEY }}
          NIGHTWATCH_GOOGLE_APP_ID: ${{ vars.NIGHTWATCH_GOOGLE_APP_ID }}
      - name: Release links
        shell: pwsh
        run: |
          "## Release complete" >> $env:GITHUB_STEP_SUMMARY
          "[Open releases](https://github.com/${{ github.repository }}/releases)" >> $env:GITHUB_STEP_SUMMARY
