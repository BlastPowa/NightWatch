appId: com.blastpowa.nightwatch
productName: NightWatch
artifactName: NightWatch-Setup-${version}.${ext}
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - "!**/*.map"
# Note: no `publisherName` here — with unsigned binaries, electron-updater
# treats it as a code-signature requirement and rejects every update
# ("not signed by the application owner"). Restore it only if/when a real
# code-signing certificate is added.
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: BlastPowa
  repo: NightWatch
